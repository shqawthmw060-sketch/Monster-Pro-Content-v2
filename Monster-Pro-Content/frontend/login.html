<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monster Pro IPTV - Login</title>

<style>
body{
    margin:0;
    background:#090d18;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.box{
    width:350px;
    background:#131b2e;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 30px #00bfff55;
}

h1{
    color:#00d4ff;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#00bfff;
    border:none;
    border-radius:8px;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>Monster Pro</h1>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

if(user.value=="admin" && pass.value=="123456")
location.href="dashboard.html";

else
alert("Wrong Username or Password");

}

</script>

</body>
</html>
