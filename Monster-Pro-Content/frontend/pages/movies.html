<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Monster Pro IPTV - Movies</title><link rel="stylesheet" href="../css/movies.css"></head><body><header><h1>🎬 Monster Pro IPTV - Movies</h1><button onclick="openModal()">➕ Add Movie</button></header><div class="container"><div class="toolbar"><input id="search" placeholder="Search movies..."><select id="genre"><option value="">All Genres</option><option>Action</option><option>Drama</option><option>Comedy</option><option>Horror</option></select><button onclick="loadMovies()">🔄 Refresh</button></div><table><thead><tr><th>Poster</th><th>Title</th><th>Year</th><th>Genre</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead><tbody id="moviesBody"><tr><td colspan="7">Loading...</td></tr></tbody></table><div class="pagination"><button onclick="prevPage()">⬅ Previous</button><span id="pageInfo">1 / 1</span><button onclick="nextPage()">Next ➡</button></div></div><div class="modal" id="movieModal"><div class="modal-content"><h2>Add / Edit Movie</h2><input id="title" placeholder="Movie Title"><textarea id="description" placeholder="Description"></textarea><input id="poster" placeholder="Poster URL"><input id="backdrop" placeholder="Backdrop URL"><input id="genreInput" placeholder="Genre"><input id="year" type="number" placeholder="Year"><input id="language" placeholder="Language"><input id="rating" type="number" step="0.1" placeholder="Rating"><input id="duration" placeholder="Duration"><input id="stream" placeholder="Stream URL"><div class="modal-buttons"><button onclick="saveMovie()">💾 Save</button><button onclick="closeModal()">Cancel</button></div></div></div><script src="../js/movies.js"></script></body></html>
