<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Monster Pro IPTV - Channels</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
font-size:28px;
font-weight:bold;
}

.toolbar{
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

input,select{
padding:10px;
border:none;
border-radius:8px;
font-size:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1e293b;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

tr:hover{
background:#1f2937;
}

img{
border-radius:6px;
}

.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:20px;
}

#info{
font-weight:bold;
color:#38bdf8;
}

</style>

</head>

<body>

<header>

📺 Monster Pro IPTV - Channels

</header>

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Search Channel..."
onkeyup="filterChannels()">

<button onclick="loadChannels()">
🔄 Refresh
</button>

<button onclick="location.href='import.html'">
📂 Import M3U
</button>

<select id="pageSize" onchange="changePageSize()">

<option value="25">25</option>

<option value="50" selected>50</option>

<option value="100">100</option>

<option value="250">250</option>

<option value="500">500</option>

</select>

<span id="info"></span>

</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Group</th>
<th>Country</th>
<th>Language</th>
<th>Logo</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

<div class="pagination">

<button onclick="prevPage()">
⬅ Previous
</button>

<span id="pageNumber">

1

</span>

<button onclick="nextPage()">
Next ➡
</button>

</div>

<script>

let channels=[];

let currentPage=1;

let totalPages=1;

let pageSize=50;

async function loadChannels(){

const res=await fetch(`/api/channels?page=${currentPage}&limit=${pageSize}`);

const result=await res.json();

channels=result.data;

totalPages=result.pages;

renderTable(channels);

document.getElementById("pageNumber").innerHTML=
`${currentPage} / ${totalPages}`;

document.getElementById("info").innerHTML=
`Total : ${result.total} Channels`;

}

function renderTable(data){

    console.log("Data:", data);

    const tbody = document.getElementById("tbody");

    let html = "";

    data.forEach(ch => {

        html += `
        <tr>
            <td>${ch.id}</td>
            <td>${ch.name}</td>
            <td>${ch.group_title}</td>
            <td>${ch.country}</td>
            <td>${ch.language}</td>
            <td>
<img src="${ch.tvg_logo}" width="40">
</td>

<td>
<button onclick="editChannel(${ch.id})">✏️</button>

<button
style="background:#dc2626"
onclick="deleteChannel(${ch.id})">
🗑️
</button>
</td>
        </tr>
        `;

    });

    console.log(html);

    tbody.innerHTML = html;

}

function filterChannels(){

const value=document
.getElementById("search")
.value
.toLowerCase();

const filtered=channels.filter(c=>

(c.name||"").toLowerCase().includes(value) ||

(c.group_title||"").toLowerCase().includes(value) ||

(c.country||"").toLowerCase().includes(value)

);

renderTable(filtered);

}

function nextPage(){

if(currentPage<totalPages){

currentPage++;

loadChannels();

}

}

function prevPage(){

if(currentPage>1){

currentPage--;

loadChannels();

}

}

function changePageSize(){

pageSize=parseInt(document.getElementById("pageSize").value);

currentPage=1;

loadChannels();

}
async function deleteChannel(id){

if(!confirm("Delete this channel?")) return;

await fetch("/api/channels/"+id,{
method:"DELETE"
});

loadChannels();

}

let editingId=null;

function editChannel(id){

const ch=channels.find(c=>c.id===id);

if(!ch) return;

editingId=id;

editName.value=ch.name||"";
editGroup.value=ch.group_title||"";
editCountry.value=ch.country||"";
editLanguage.value=ch.language||"";
editLogo.value=ch.tvg_logo||"";
editStream.value=ch.stream_url||"";

editModal.style.display="flex";

}

function closeModal(){

editModal.style.display="none";

}

async function saveChannel(){

await fetch("/api/channels/"+editingId,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:editName.value,

group_title:editGroup.value,

country:editCountry.value,

language:editLanguage.value,

tvg_logo:editLogo.value,

stream_url:editStream.value

})

});

closeModal();

loadChannels();

}

loadChannels();
</script>
<div id="editModal" style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
">

<div style="
background:#1e293b;
padding:25px;
border-radius:12px;
width:420px;
">

<h2 style="margin-bottom:20px">
✏️ Edit Channel
</h2>

<input id="editName" placeholder="Channel Name"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="editGroup" placeholder="Group"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="editCountry" placeholder="Country"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="editLanguage" placeholder="Language"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="editLogo" placeholder="Logo URL"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="editStream" placeholder="Stream URL"
style="width:100%;padding:10px;margin-bottom:20px;">

<button onclick="saveChannel()">
💾 Save
</button>

<button
style="background:#dc2626;margin-left:10px"
onclick="closeModal()">
Cancel
</button>

</div>

</div>
</body>

</html>
